services:
  # Frontend: React + Vite (Static Site - kostenlos)
  - type: web
    name: wohnungsradar-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false   # Backend-URL, wird später eingetragen
